name: Listing all s3 buckets


on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  list-s3-buckets:
    runs-on: ubuntu-latest
    steps:
      - name: set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          aws-region: us-east-1
      - name: List S3 buckets
        run: aws s3 ls 